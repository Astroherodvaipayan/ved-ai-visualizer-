<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Lotus petals with gradient -->
  <defs>
    <linearGradient id="petalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8f00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffc107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#388e3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer petals -->
  <ellipse cx="100" cy="60" rx="15" ry="35" fill="url(#petalGradient)" transform="rotate(0 100 100)" opacity="0.9"/>
  <ellipse cx="100" cy="60" rx="15" ry="35" fill="url(#petalGradient)" transform="rotate(45 100 100)" opacity="0.9"/>
  <ellipse cx="100" cy="60" rx="15" ry="35" fill="url(#petalGradient)" transform="rotate(90 100 100)" opacity="0.9"/>
  <ellipse cx="100" cy="60" rx="15" ry="35" fill="url(#petalGradient)" transform="rotate(135 100 100)" opacity="0.9"/>
  <ellipse cx="100" cy="60" rx="15" ry="35" fill="url(#petalGradient)" transform="rotate(180 100 100)" opacity="0.9"/>
  <ellipse cx="100" cy="60" rx="15" ry="35" fill="url(#petalGradient)" transform="rotate(225 100 100)" opacity="0.9"/>
  <ellipse cx="100" cy="60" rx="15" ry="35" fill="url(#petalGradient)" transform="rotate(270 100 100)" opacity="0.9"/>
  <ellipse cx="100" cy="60" rx="15" ry="35" fill="url(#petalGradient)" transform="rotate(315 100 100)" opacity="0.9"/>
  
  <!-- Inner petals -->
  <ellipse cx="100" cy="70" rx="12" ry="25" fill="url(#petalGradient)" transform="rotate(22.5 100 100)" opacity="0.95"/>
  <ellipse cx="100" cy="70" rx="12" ry="25" fill="url(#petalGradient)" transform="rotate(67.5 100 100)" opacity="0.95"/>
  <ellipse cx="100" cy="70" rx="12" ry="25" fill="url(#petalGradient)" transform="rotate(112.5 100 100)" opacity="0.95"/>
  <ellipse cx="100" cy="70" rx="12" ry="25" fill="url(#petalGradient)" transform="rotate(157.5 100 100)" opacity="0.95"/>
  <ellipse cx="100" cy="70" rx="12" ry="25" fill="url(#petalGradient)" transform="rotate(202.5 100 100)" opacity="0.95"/>
  <ellipse cx="100" cy="70" rx="12" ry="25" fill="url(#petalGradient)" transform="rotate(247.5 100 100)" opacity="0.95"/>
  <ellipse cx="100" cy="70" rx="12" ry="25" fill="url(#petalGradient)" transform="rotate(292.5 100 100)" opacity="0.95"/>
  <ellipse cx="100" cy="70" rx="12" ry="25" fill="url(#petalGradient)" transform="rotate(337.5 100 100)" opacity="0.95"/>
  
  <!-- Center of lotus -->
  <circle cx="100" cy="100" r="18" fill="url(#centerGradient)"/>
  <circle cx="100" cy="100" r="12" fill="#ffc107" opacity="0.8"/>
  <circle cx="100" cy="100" r="6" fill="#ff8f00"/>
  
  <!-- Decorative center dots -->
  <circle cx="100" cy="100" r="2" fill="#ffffff" opacity="0.6"/>
  
  <!-- Optional leaf elements -->
  <ellipse cx="100" cy="160" rx="8" ry="20" fill="url(#leafGradient)" transform="rotate(-15 100 100)" opacity="0.7"/>
  <ellipse cx="100" cy="160" rx="8" ry="20" fill="url(#leafGradient)" transform="rotate(15 100 100)" opacity="0.7"/>
</svg>